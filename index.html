<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Streak Tracker</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --border: #30363d;
      --primary: #da3633; /* Đỏ cho streak */
      --primary-hover: #f85149;
      --day-empty: #21262d;
      --day-active: #da3633;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; line-height: 1.5; }
    .container { max-width: 800px; margin: 0 auto; }
    
    /* Header & Form */
    header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 15px; }
    .add-form { display: flex; gap: 10px; flex-wrap: wrap; }
    input, select, button { padding: 10px 15px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
    input:focus, select:focus { border-color: var(--primary); }
    input { flex: 1; min-width: 200px; }
    button { background: var(--text); color: var(--bg); font-weight: 600; cursor: pointer; transition: 0.2s; border: none; }
    button:hover { background: #fff; }
    
    /* Streak Cards */
    .streak-list { display: flex; flex-direction: column; gap: 20px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .card-title { font-size: 18px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
    .tag { font-size: 12px; padding: 2px 8px; border-radius: 12px; background: var(--border); color: var(--text-muted); }
    .streak-count { font-size: 14px; color: var(--primary); font-weight: bold; }
    
    /* Heatmap Calendar */
    .heatmap-wrapper { overflow-x: auto; padding-bottom: 10px; }
    .heatmap { display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; gap: 4px; min-width: max-content; }
    .day-box { width: 14px; height: 14px; background-color: var(--day-empty); border-radius: 3px; cursor: pointer; position: relative; transition: 0.1s; }
    .day-box:hover { transform: scale(1.2); z-index: 10; border: 1px solid #fff; }
    .day-box.active { background-color: var(--day-active); }
    .day-box.has-note::after {
      content: ''; position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; background-color: #ffd700; border-radius: 50%; border: 1px solid var(--panel);
    }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; width: 90%; max-width: 400px; }
    .modal h3 { margin-bottom: 5px; color: #fff; }
    .modal-date { font-size: 12px; color: var(--text-muted); margin-bottom: 15px; display: block; }
    .study-fields { display: none; margin-bottom: 10px; }
    .study-fields.show { display: flex; flex-direction: column; gap: 10px; }
    textarea { width: 100%; height: 100px; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); resize: none; margin-bottom: 15px; outline: none; }
    textarea:focus { border-color: var(--primary); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    .btn-cancel { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-cancel:hover { background: var(--border); }
    .btn-save { background: var(--primary); color: #fff; }
    .btn-save:hover { background: var(--primary-hover); }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Trackers</h1>
      <div class="add-form">
        <input type="text" id="streakInput" placeholder="Tên thói quen...">
        <select id="streakType">
          <option value="Tự do">Tự do</option>
          <option value="Học tập">Học tập</option>
          <option value="Thể thao">Thể thao</option>
        </select>
        <button id="addBtn">Tạo</button>
      </div>
    </header>

    <div class="streak-list" id="streakList">
      <!-- Data render here -->
    </div>
  </div>

  <!-- Note Modal -->
  <div class="modal-overlay" id="noteModal">
    <div class="modal">
      <h3 id="modalTitle">Ghi chú</h3>
      <span class="modal-date" id="modalDate"></span>
      
      <div class="study-fields" id="studyFields">
        <input type="number" id="studyTime" placeholder="Thời gian học (phút)...">
      </div>

      <textarea id="modalNote" placeholder="Nội dung..."></textarea>
      
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancel">Đóng</button>
        <button class="btn-save" id="btnSave">Lưu & Check-in</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    // Thay config của m vào đây
    const firebaseConfig = {
      apiKey: "API_KEY",
      authDomain: "DOMAIN",
      projectId: "PROJECT_ID",
      storageBucket: "BUCKET",
      messagingSenderId: "SENDER",
      appId: "APPID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Tính toán mảng 90 ngày gần nhất cho Heatmap
    function getLast90Days() {
      const dates = [];
      for (let i = 89; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dates.push(d.toISOString().split('T')[0]); // Format YYYY-MM-DD
      }
      return dates;
    }
    const daysRange = getLast90Days();

    // DOM
    const streakList = document.getElementById('streakList');
    const input = document.getElementById('streakInput');
    const typeSelect = document.getElementById('streakType');
    const addBtn = document.getElementById('addBtn');
    
    // Modal DOM
    const modal = document.getElementById('noteModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalDate = document.getElementById('modalDate');
    const modalNote = document.getElementById('modalNote');
    const studyFields = document.getElementById('studyFields');
    const studyTime = document.getElementById('studyTime');
    const btnCancel = document.getElementById('btnCancel');
    const btnSave = document.getElementById('btnSave');

    let currentConfig = { streakId: null, dateStr: null, type: null };

    // Tạo mới Streak
    addBtn.addEventListener('click', async () => {
      const title = input.value.trim();
      const type = typeSelect.value;
      if (!title) return;
      
      await addDoc(collection(db, "streaks"), {
        title, type, createdAt: new Date()
      });
      input.value = '';
    });

    // Lắng nghe dữ liệu Realtime
    onSnapshot(collection(db, "streaks"), (snapshot) => {
      streakList.innerHTML = '';
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const streakId = docSnap.id;
        renderCard(streakId, data);
      });
    });

    // Render từng Card
    function renderCard(id, data) {
      const card = document.createElement('div');
      card.className = 'card';
      
      // Khởi tạo sub-collection checkins (ảo trên UI, fetch thực tế ở dưới)
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title">${data.title} <span class="tag">${data.type}</span></div>
          <div class="streak-count" id="count-${id}">🔥 0 ngày</div>
        </div>
        <div class="heatmap-wrapper">
          <div class="heatmap" id="heatmap-${id}"></div>
        </div>
      `;
      streakList.appendChild(card);

      const heatmapEl = document.getElementById(`heatmap-${id}`);
      let totalStreak = 0;

      // Lấy lịch sử Check-ins của streak này
      onSnapshot(collection(db, `streaks/${id}/checkins`), (checkinSnap) => {
        const checkinData = {};
        totalStreak = checkinSnap.size;
        document.getElementById(`count-${id}`).textContent = `🔥 ${totalStreak} ngày`;

        checkinSnap.forEach(snap => {
          checkinData[snap.id] = snap.data();
        });

        // Vẽ 90 ô vuông
        heatmapEl.innerHTML = '';
        daysRange.forEach(dateStr => {
          const box = document.createElement('div');
          box.className = 'day-box';
          box.title = dateStr;
          
          if (checkinData[dateStr]) {
            box.classList.add('active'); // Ngày màu đỏ
            if (checkinData[dateStr].note || checkinData[dateStr].studyTime) {
              box.classList.add('has-note'); // Chấm vàng
            }
          }

          // Click vào ô để check-in / xem note
          box.addEventListener('click', () => openModal(id, data.title, data.type, dateStr, checkinData[dateStr]));
          heatmapEl.appendChild(box);
        });
      });
    }

    // Xử lý Modal
    function openModal(streakId, title, type, dateStr, existingData) {
      currentConfig = { streakId, dateStr, type };
      
      modalTitle.textContent = title;
      modalDate.textContent = `Ngày: ${dateStr}`;
      
      // Hiển thị template riêng cho Học tập
      if (type === 'Học tập') {
        studyFields.classList.add('show');
        studyTime.value = existingData?.studyTime || '';
      } else {
        studyFields.classList.remove('show');
      }

      modalNote.value = existingData?.note || '';
      modal.classList.add('open');
    }

    btnCancel.addEventListener('click', () => modal.classList.remove('open'));

    // Lưu / Check-in
    btnSave.addEventListener('click', async () => {
      const { streakId, dateStr, type } = currentConfig;
      const docRef = doc(db, `streaks/${streakId}/checkins`, dateStr);
      
      const payload = {
        note: modalNote.value.trim(),
        timestamp: new Date()
      };

      if (type === 'Học tập') {
        payload.studyTime = parseInt(studyTime.value) || 0;
      }

      // setDoc để tạo hoặc ghi đè note của ngày đó
      await setDoc(docRef, payload, { merge: true });
      modal.classList.remove('open');
    });
  </script>
</body>
</html>
